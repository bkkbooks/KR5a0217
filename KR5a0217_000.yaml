front:
  text: 上清天寳齋初夜儀爲九
  hash: sha256:007b32b3b74d840b40d15b855132daf528df911affa69aa801d4d553f8e9501d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0217_HFL_000-001a, image: hfl/0084/0084-108.png}
body:
  text: 上清天寳齋者學道之人求仙要訣學授上清畢法之後得行此齋如授中法不得行天寳齋也先爲帝王國主祈福次爲祖禰請恩洗滌宿瑕懴謝新過功行圎滿道德著充自然成仙白日騰翥天子鎭信金龍五枚各重五兩玉璧五枚各方三寸東方青綾九匹南方赤綾三匹西方白綾七匹北方黒綾五匹中央黃綾一十二匹巳上鎭綵紋繒並須宻緻厚實者如是輕薄者不用公侯鎭信金龍五枚各重一兩玉璧五枚各隨大小東方青綾一匹南方赤綾一匹西方白綾一匹北方皁綾一匹中央黃綾一匹巳上鎭信綵繒並須宻緻厚實者如是輕薄者不用庶人鎭信東方青絹九尺南方緋絹三尺西方白絹七尺北方皁絹五尺中央黃絹一丈二尺巳上鎭信綵繒並須宻緻厚實輕薄者不在用限青童君曰若是修行志久在山巖中奉道誠深求仙願切但備香燈無煩龍綵精潔虔心自然得道也凡欲修齋先以黃書眞文九道於青紙上安在天門一小案上還官之日只於天門燒之上至天子下至庶人於壇上級㸃三十二天燈每位一盞中級下級隨力所辦壇外更㸃二十八宿燈及五星燈本命五燈行年九燈於本屬位上蠟燭隨事充足壇上門户牓子一如黃籙齋法先引齋主於玄師前關告齋意次唱道次請三師次華夏讃引至地户次勑水次昇壇呪從天門入天玄炁清三光洞明金房道室五芝寳生玄雲紫蓋來映我形玉童玉女爲我致靈五帝齊景三光同軿騰駕龍鶴昇入紫庭齋主請福願保長生通眞使者速達上清次旋行上五方香晝從東夜從北次上御案香次上本位香次各禮師存念如法次衞靈神呪次鳴法鼓二十四通次發鑪上元五靈五老虚無自然元一天尊無上天寳君直香金童素靈玉女左右玉靈自然通眞飛光龍騎各八十一人並出嚴莊關啓此間土地里域眞官臣今正爾燒香行道奉爲齋主某官修設上清天寳大齋一宿道場三朝法事精排蘭味嚴潔香花繒綵金龍祈恩請福願得無上十方金丹玉光降流齋主身中所啓速聞髙上玉帝萬聖几前次各稱名位具法位臣某奉行上清天寳大齋初夜法事及諸道衆齋主等謹同誠上啓虚無自然無極大道元始天尊無上天寳元君上清玉帝太上道君太上老君太上丈人無上玄老髙上玉皇西龜王母南岳夫人十方得道大聖衆至眞玄德諸君丈人玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十二天帝二十四髙眞太平下教文始先生天地水三官上相上宰日月星辰四司五帝天仙地仙飛仙神仙玄中大法師經籍度三師三天大法師五嶽四瀆八海九江名山洞府三界官屬一切眞靈臣聞圎清方濁孕无於玄關禀象分形資靈於妙道循環不輟化育無遺覆載生成司明罪福此即元皇演教太上流科飛法雨以蕩塵勞運慈舟而超苦海是以齋主某敢投切懇上叩玄關乞福祈恩消災散禍羅列香燈繒綵金龍建一宵之道場赴三時之法席臣以胎生陋質乳哺凡庸宿積慶縁幸居玄化早年冠褐志慕眞宗受法籙於星壇傳香燈於月殿登壇之日告盟之時許闡玄猷宣揚聖典凡有歸向敢不上聞齋主青詞謹當宣奏次讀詞按如詞旨祈福誠深㧞度存亡資延福壽發心舉意三界遙知謝過追愆萬聖容許手持香火心祝虚無行道三時設齋一座精修蘭味嚴潔香花延三島之髙眞降十方之上聖玄穹渺邈啓告皆通大道無涯叩其深意鑒察追非之懇聆聞悔過之詞俯賜玄恩弘開宥典念向來之愚短捨巳往之深非前代之尤今生之過庶使百骸通恱六府均調五藏懽怡萬神安穩丹宫有飛昇之字黒府無朽敗之名萬累俱消千祥竟至𡨚仇息對債主停詞故殺誤傷咸令解釋精心絶念注想玄關今夜略啓齋因來日别陳祝懇此間土地里域眞官録此齋功上聞眞界所有懇願上徹三清無極道君玉帝几前次禮十方臣等志心歸命北方無極無窮元始髙上天寳元君上清天尊每方倣此各一禮次各虔誠懴悔臣等志心歸命十方無極大道天寳元君上清玉帝臣等以今懴悔散鑠咎愆普降洪慈深貽巨澤遍禮東西南北上下四維日月星辰名山洞府五嶽四瀆八海九江三界官屬一切眞靈上祝當今皇帝聖算遐長皇圖鞏固懴悔臣等官寮文武及以齋主九玄先逺内外宗親四友三師上下眷屬前生今世歷劫罪尤輕聖慢賢誘欺四輩不忠不孝毀像毀經殘害無辜損傷生𩔖如斯咎釁堆積如山不憑道力消禳無以得階仙果願以舊愆消盡新慶全臻惟吉惟禎眞靈翼祐𡨚仇息對債主停詞故殺誤傷咸令解釋丹宫署簡黒部除名永泰福郷長芳壽域禍沉九夜福起十方稽首歸依正眞三寳次朗誦元始三天章清微天頌元始洞空無三炁精上門紫融灌大虚四明植靈根妙化發東瓊三便啓西崑浩映九玄清五華帶錦雲離羅煥神燈七星燿北元飄颻上清畿翼翼帝一尊落落髙上張羽童何紛紛流香本無色洞入萬仙羣左迴三流劫右轉九天關金華纓素雲八風舞空輪四時無停機青白早分明九九攺劫運三三度一椿天地有終㑹否激歸任飜洞明正一法嚴修六天文太平反空無奉翼後聖君禹餘天頌靈風起西門錦雲生東瓊三氣煥玉洲流香乗煙輕五花披風散倐歘朗九清騫樹燿朱日黃華逐月生中有採芝童衣羽帶飛青飄景萬嶺峰逍遙宴緑軿控御九空輪運開無稽程左令三天文右攝六天兵檢炁反空洞六度應運傾劫運自有㑹誰測敗與成洪波淪雲綱六合無遺形魄尸漂長流孤魂湮復零悲此去來際乃覺正法明至學加精修東華結瓊名欣有白簡人相與樂太平大赤天頌洞關運天經五氣轉三微紫户吐瓊簡金門納神暉八㑹交眞風晃朗重冥開天際九清外落落髙晨迴三色反空無四候應玉機河侯巳鼓筆五行潜相推六度無終劫運極乗炁歸萬魔羅天布羣凶競吐威兆民負災衝積尸令人悲妙哉正法文履劫明不衰至時相奉迎契在九天扉與爾期太平放身無翼飛次三禮志心稽首禮無極無窮元始髙上天寳元君上清天尊志心稽首禮三十六部上清眞經自然黃書至極靈文志心稽首禮太上三尊玄中法師道德聖衆一切仙眞次重稱名位虚無自然無極大道髙上元始天寳元君玉皇上帝太上老君上相上宰三界官屬一切眞靈臣以忝逢道化宿有靈源參佩眞符獲披瓊韞受道之日告盟之時許闡玄猷宣揚聖典齋官祈恩情切謝過誠深法中三朝設齋一座香飛八景燈吐千花禱祝於寳座之前注想於碧霄之上伏願虚無聖衆太上髙眞監此精虔厚貽禎貺令臣得道魔試不侵萬聖護持千靈翼賛今依科法說戒遶壇明日燒香更申啓奏願開慈照俯視精誠㧞度沉迷早昇雲路存亡獲泰共保清貞壽峻南山福深東海上明天尊覆育之澤下副臣等歸命之誠感謝正眞垂映下照稽首再拜次八願上清玉帝太素元君太上髙靈仙都大神今日上告八願開陳一願飛霄長生神眞二願天地合景風雲三願五嶽與身長存四願九祖解罪脫愆五願福壽斷絶胎根六願端正智惠開全七願滅鬼斬馘六天八願甘露永劫長延次復鑪仙靈仙官金童使者五帝五嶽神仙眞人三光正眞左右龍虎天仙五靈香官當令召致無上十方正眞生炁自然金液丹精芝英九天玉眞在此齋壇洞觀齋主覆護昇仙飛行太空騰景九天玉童玉女侍衛香煙傳臣向來所啓速逹髙眞上清玉帝萬聖几前吟遊壇頌一帀下壇衆仙出洞眞煥爛耀太清奉者號仙人形質永長生逍遙戲玄虚宫殿羅無形蒨璨七寳林晃朗日月精龍鱗交橫馳鳯凰翔悲鳴太上治玄宫衆眞誦洞經焚香稽首禮左行遶宫城三周歸髙坐天尊當應聲一心弘至道天下普安寧學仙注下壇呪從地户出福壽旣往殞籍落名天帝有命億劫齊生事畢復位萬神咸寧後有關啓復降眞靈至玄師前拜謝而散上清天寳齋初夜儀終
